services:
  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: xennic-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - xennic-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  qdrant_storage:
    driver: local

networks:
  xennic-network:
    driver: bridge
    name: xennic-network
