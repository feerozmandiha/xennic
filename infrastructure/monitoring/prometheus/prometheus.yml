global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'rules/xennic-alerts.yml'

scrape_configs:
  - job_name: 'api'
    static_configs:
      - targets: ['api:3000']
    metrics_path: /api/v1/metrics

  - job_name: 'engineering-service'
    static_configs:
      - targets: ['engineering-service:8001']

  - job_name: 'ai-service'
    static_configs:
      - targets: ['ai-service:8002']

  - job_name: 'vision-service'
    static_configs:
      - targets: ['vision-service:8003']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']

  - job_name: 'pgbouncer'
    static_configs:
      - targets: ['pgbouncer-exporter:9127']
